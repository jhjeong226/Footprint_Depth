# =============================================================================
# physics 블록 교체분 — 완전한 Köhli(2015)/Schrön(2017) footprint
# default.yaml, sites/HC.yaml, sites/PC.yaml 의 `physics:` 아래에 반영
# (neutron_moisture, vegetation, pressure 는 기존 값 유지)
# =============================================================================
physics:
  pressure:
    P0: 1013.25
    alpha_p: 1.0

  # --- N(θ) 관계식 (Köhli 2021) : 기존 유지 ---
  neutron_moisture:
    N0: 1950          # 사이트별 값 유지 (HC:1753, PC:2400)
    p1: 0.0226
    p2: 0.207
    p3: 1.024
    p4: -0.0093
    p5: 0.000074
    p6: 1.625
    p7: 0.235
    p8: -0.0029

  # --- 깊이 가중 함수 D86 : 검증된 계수로 교체 ---
  # 주의: 기존 (p3=26.42, p4=0.0567, exp(-r/100)) 대신
  #       Schrön 2017/neptoon 검증판 사용. dry~39cm, wet~17cm 재현.
  depth_weighting:
    p0: 8.321
    p1: 0.14249
    p2: 0.96655      # (기존 0.86655 → 0.96655)
    c_num: 20.0      # 분자 상수 (기존 p3=26.42 → 20.0)
    c_den: 0.0429    # 분모 상수 (기존 p4=0.0567 → 0.0429)
    Lr: 100.0        # 거리 감쇠 길이 (exp(-r/Lr))

  # --- 수평 가중 함수 Wr : 완전한 F1–F4 (8-파라미터) ---
  # Köhli et al. (2015) App.A / Schrön et al. (2017) App.A
  # neptoon v0.14 와 점값 단위까지 일치 검증 완료.
  radial_weighting_full:
    # 근거리 파라미터 함수 A0..A3 계수
    a00: 8735
    a01: 22.689
    a02: 11720
    a03: 0.00978
    a04: 9306
    a05: 0.003632
    a10: 0.027925     # 2.7925e-2
    a11: 6.6577
    a12: 0.028544
    a13: 0.002455
    a14: 0.00006851   # 6.851e-5
    a15: 12.2755
    a20: 247970
    a21: 23.289
    a22: 374655
    a23: 0.00191
    a24: 258552
    a30: 0.054818     # 5.4818e-2
    a31: 21.032
    a32: 0.6373
    a33: 0.0791
    a34: 0.0005425    # 5.425e-4
    # 원거리 파라미터 함수 B0..B3 계수
    b00: 39006
    b01: 15002337
    b02: 2009.24
    b03: 0.01181
    b04: 3.146
    b05: 16.7417
    b06: 3727
    b10: 0.00006031   # 6.031e-5
    b11: 98.5
    b12: 0.0013826
    b20: 11747
    b21: 55.033
    b22: 4521
    b23: 0.01998
    b24: 0.00604
    b25: 3347.4
    b26: 0.00475
    b30: 0.01543      # 1.543e-2
    b31: 13.29
    b32: 0.01807      # 1.807e-2
    b33: 0.0011
    b34: 0.0000881    # 8.81e-5
    b35: 0.0405
    b36: 26.74

  # --- 단순 근사식 (Schrön 2023 Eq.2) 비교/폴백용 ---
  radial_weighting:
    a1: 30.0
    b1: 1.6
    a2: 1.0
    b2: 100.0
    c: 3.7

  # --- 식생 영향 : 기존 유지 ---
  vegetation:
    c1: 0.17
    c2: 0.41
    c3: 7.0
