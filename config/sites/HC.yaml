# =============================================================================
# HC Site Configuration (overrides default.yaml)
# =============================================================================

project:
  base_path: "E:/02.Data/05.CRNP/02.UTS_system/98.Code_test/01.FootprintRadius/Footprint_Depth"

site:
  name: "HC"
  description: "HC observation site"
  bulk_density: 1.22  # g/cm³
  field_capacity: 0.28
  location:
    latitude: null
    longitude: null
  soil_info:
    texture: "Sandy loam"
    organic_matter: 0.22  # g/kg

paths:
  swc_file: "{site_name}_FDR_daily_depths.xlsx"

analysis:
  max_extent: 200
  resolution: 5

interpolation:
  rbf_function: "multiquadric"
  rbf_smooth: 0.2
  edge_control: False
  hull_buffer_m: 1.0
  outside_fill: nearest

physics:
  neutron_moisture:
    N0: 1753  # HC 사이트 고유값

dates:
  calibration:
    - "2024-07-23"
  analysis:
    - "2024-08-16"
    - "2024-09-20"
    - "2024-10-20"

plotting:
  panel_swc:
    use_discrete_colors: true
    n_levels: 12
    cmap_name: "Blues"
